<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Promo Hub — Your Automated Promotion Engine</title>
<meta name="description" content="Auto-updated promotional content, deals, and recommendations.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
  header { background: linear-gradient(135deg, #6366f1, #ec4899); padding: 60px 20px; text-align: center; }
  header h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fff; }
  header p { color: #f1f5f9; font-size: 1.1rem; }
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
  .card { background: #1e293b; border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #334155; }
  .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(99,102,241,0.3); }
  .card a { color: inherit; text-decoration: none; display: block; padding: 25px; }
  .card h2 { color: #f1f5f9; font-size: 1.3rem; margin-bottom: 12px; }
  .card p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 15px; }
  .tag { display: inline-block; background: #6366f1; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; margin-right: 6px; margin-bottom: 6px; }
  .date { color: #64748b; font-size: 0.85rem; }
  .empty { text-align: center; color: #94a3b8; padding: 60px 20px; }
  footer { text-align: center; padding: 40px 20px; color: #64748b; border-top: 1px solid #334155; margin-top: 60px; }
  footer a { color: #818cf8; text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1>🚀 Daily Promo Hub</h1>
  <p>Auto-curated promotions, deals & discoveries — updated every few hours</p>
</header>

<div class="container">
  <div class="grid" id="posts-grid">
    <p class="empty">⏳ Loading latest posts...</p>
  </div>
</div>

<footer>
  <p>Powered by free GitHub Actions • Auto-updated • <a href="https://github.com">View source</a></p>
</footer>

<script>
fetch('./data/articles.json')
  .then(r => r.ok ? r.json() : { articles: [] })
  .then(data => {
    const grid = document.getElementById('posts-grid');
    const articles = (data.articles || []).slice(0, 24);
    if (articles.length === 0) {
      grid.innerHTML = '<p class="empty">No posts yet. Automation will publish the first one soon!</p>';
      return;
    }
    grid.innerHTML = articles.map(a => `
      <div class="card">
        <a href="./posts/${a.slug}.html">
          <h2>${escapeHtml(a.title)}</h2>
          <p>${escapeHtml(a.summary || '').slice(0, 160)}...</p>
          <div>${(a.tags || []).slice(0, 3).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
          <p class="date">📅 ${new Date(a.date).toLocaleDateString()}</p>
        </a>
      </div>
    `).join('');
  })
  .catch(err => {
    document.getElementById('posts-grid').innerHTML = '<p class="empty">No posts yet.</p>';
  });

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>

</body>
</html>
