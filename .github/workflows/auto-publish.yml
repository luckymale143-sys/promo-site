name: Auto-Publish Promotional Content

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours. Change to '*/2' for every 2h, '0 */6' for every 6h.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser

      - name: Generate new posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate.js

      - name: Commit & push
        run: |
          git config user.name "promo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ posts/
          if git diff --staged --quiet; then
            echo "No new content to publish."
          else
            git commit -m "🤖 Auto-publish: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
