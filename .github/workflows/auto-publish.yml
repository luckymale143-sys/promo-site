name: Auto-Publish Promotional Content

on:
  schedule:
    # Runs every 4 hours. Adjust as needed.
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Allows manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rss-parser
        run: npm install rss-parser

      - name: Generate new posts
        env:
          # ✅ OPTIONAL: Add a free Gemini API key for AI rewriting
          # Get one free at https://aistudio.google.com/apikey
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate.js

      - name: Commit & push generated content
        run: |
          git config user.name "promo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ posts/
          if git diff --staged --quiet; then
            echo "No new content to publish."
          else
            git commit -m "🤖 Auto-publish: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
